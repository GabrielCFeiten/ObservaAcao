<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contatos — Observa Ação</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/admin-contacts.css">
</head>
<body>
  <main class="container contacts-wrap">
    <section class="card">
      <h2>Contatos públicos</h2>
      <p class="section-sub">Estes dados são exibidos aos cidadãos. Edite e salve para atualizar.</p>

      <form id="contactsForm" novalidate>
        <div class="field">
          <label for="ctEmail">E-mail</label>
          <input id="ctEmail" type="email" required>
        </div>
        <div class="field">
          <label for="ctTelefone">Telefone</label>
          <input id="ctTelefone" type="tel" required>
        </div>
        <div class="field">
          <label for="ctEndereco">Endereço físico</label>
          <textarea id="ctEndereco" rows="3" required></textarea>
        </div>
        <button class="btn btn-primary" type="submit">Salvar contatos</button>
        <p class="form-msg" id="contactsMsg"></p>
      </form>
    </section>

    <section class="card preview-card">
      <h3>Pré-visualização (visão do cidadão)</h3>
      <dl id="contactsPreview" class="preview-list"></dl>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/admin-contacts.js"></script>
</body>
</html>
