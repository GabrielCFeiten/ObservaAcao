spring.application.name=observaAcao

# ===================================================================
# PROFILE ATIVO
# "dev" liga o seeder de demonstração (DevDataSeeder) e o atalho de
# login (/auth/dev-login). Em PRODUÇÃO, troque para "prod" ou remova
# esta linha (ex.: -Dspring.profiles.active=prod), e o pacote `dev`
# deixa de ser carregado automaticamente.
# ===================================================================
spring.profiles.active=dev

# H2 Database (em memória — recriado a cada boot)
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:observaacaodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT Secret (em produção, usar variável de ambiente segura)
api.security.token.secret=${JWT_SECRET:observaacao-secret-dev-change-in-prod}
