<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Observa Ação</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <main class="auth-page">
    <section class="card auth-box">
      <span class="brand">Observa<span class="dot">Ação</span></span>
      <h1>Entrar</h1>
      <p class="auth-sub">Acompanhe e registre solicitações de vigilância sanitária.</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" type="email" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input id="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary btn-block" type="submit">Entrar</button>
        <p class="form-msg" id="loginMsg"></p>
      </form>

      <div class="auth-links">
        <a href="register.html">Criar conta</a>
        <a href="forgot-password.html">Esqueci minha senha</a>
      </div>

      <!-- ============ DEVELOPMENT ONLY ============
           Atalhos de acesso rápido. Só funcionam com o backend rodando
           no profile "dev". Remova este bloco antes de publicar. -->
      <div class="dev-box" id="devBox">
        <span class="dev-tag">Acesso rápido (dev)</span>
        <div class="dev-actions">
          <button class="btn btn-sm" type="button" data-dev="gestor">Entrar como Gestor</button>
          <button class="btn btn-sm" type="button" data-dev="cidadao">Entrar como Cidadão</button>
        </div>
      </div>
      <!-- ========================================== -->
    </section>
  </main>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
