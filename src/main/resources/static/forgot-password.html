<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar senha — Observa Ação</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/forgot-password.css">
</head>
<body>
  <main class="auth-page">
    <section class="card auth-box">
      <span class="brand">Observa<span class="dot">Ação</span></span>
      <h1>Recuperar senha</h1>
      <p class="auth-sub">Informe seu e-mail e enviaremos um link para redefinir a senha.</p>

      <form id="forgotForm" novalidate>
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" type="email" autocomplete="email" required>
        </div>
        <button class="btn btn-primary btn-block" type="submit">Enviar link de redefinição</button>
        <p class="form-msg" id="forgotMsg"></p>
      </form>

      <div class="auth-links">
        <a href="login.html">Voltar ao login</a>
      </div>
    </section>
  </main>
  <script src="js/api.js"></script>
  <script src="js/forgot-password.js"></script>
</body>
</html>
