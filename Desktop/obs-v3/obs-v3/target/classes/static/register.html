<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta — Observa Ação</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/register.css">
</head>
<body>
  <main class="auth-page">
    <section class="card auth-box">
      <span class="brand">Observa<span class="dot">Ação</span></span>
      <h1>Criar conta</h1>
      <p class="auth-sub">Cadastre-se para acompanhar suas solicitações pelo protocolo.</p>

      <form id="registerForm" novalidate>
        <div class="field">
          <label for="nome">Nome completo</label>
          <input id="nome" type="text" autocomplete="name" required>
        </div>
        <div class="field">
          <label for="cpf">CPF</label>
          <input id="cpf" type="text" inputmode="numeric" placeholder="000.000.000-00" required>
        </div>
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" type="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="telefone">Telefone</label>
          <input id="telefone" type="tel" placeholder="(44) 99999-9999" required>
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input id="password" type="password" autocomplete="new-password" required>
        </div>
        <div class="field">
          <label for="confirm">Confirmar senha</label>
          <input id="confirm" type="password" autocomplete="new-password" required>
        </div>
        <button class="btn btn-primary btn-block" type="submit">Cadastrar</button>
        <p class="form-msg" id="registerMsg"></p>
      </form>

      <div class="auth-links">
        <a href="login.html">Já tenho conta</a>
      </div>
    </section>
  </main>
  <script src="js/api.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
